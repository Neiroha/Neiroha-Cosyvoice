[workspace]
authors = ["Neiroha Team"]
name = "neiroha-cosyvoice"
channels = ["conda-forge"]
platforms = ["win-64"]
requires-pixi = ">=0.61.0"


[tasks]
submodule-init = { cmd = "git submodule update --init --recursive" }
install = { cmd = "python ./scripts/download_cosyvoice3_assets.py --model cosyvoice3 --source modelscope" }
install-frontend = { cmd = "python ./scripts/download_cosyvoice3_assets.py --model wetext --source modelscope" }
install-wetext = { cmd = "python ./scripts/download_cosyvoice3_assets.py --model wetext --source modelscope" }
install-ttsfrd = { cmd = "python ./scripts/download_cosyvoice3_assets.py --model ttsfrd --source modelscope" }
install-tokenizer = { cmd = "python ./scripts/download_cosyvoice3_assets.py --model wetext --source modelscope" }
clone-smoke = { cmd = "python ./scripts/smoke_test_clone.py" }
api = { cmd = "python ./scripts/launch_engine.py --surface api" }
admin = { cmd = "python ./scripts/launch_engine.py --surface admin" }
serve = { cmd = "python ./scripts/launch_engine.py" }
smoke = { cmd = "python ./scripts/smoke_test_api.py --speech" }
launcher-help = { cmd = "python ./scripts/launch_engine.py --help" }
test = { cmd = "python ./scripts/run_tests.py" }

[system-requirements]
cuda = "12.8"

[dependencies]
python = "3.12.*"
pip = "*"
setuptools = "<81"
packaging = "<25"
ffmpeg = "*"
cmake = "*"

[pypi-dependencies]
fastapi = { version = ">=0.115,<0.116", extras = ["standard"] }
starlette = ">=0.37.2,<0.41"
uvicorn = { version = ">=0.32,<1", extras = ["standard"] }
python-multipart = ">=0.0.20,<1"
gradio = ">=5.4,<6"
huggingface-hub = ">=0.26,<0.36"
hf-xet = ">=1.1,<2"
modelscope = ">=1.33,<2"
numpy = "<2.0"
soundfile = ">=0.12,<1"
pydantic = "==2.7.0"
requests = ">=2.32,<3"
conformer = "==0.3.2"
diffusers = "==0.29.0"
gdown = "==5.1.0"
grpcio = ">=1.62.3,<2"
grpcio-tools = ">=1.62.3,<2"
hydra-core = "==1.3.2"
HyperPyYAML = ">=1.2.2,<1.3"
inflect = "==7.3.1"
librosa = "==0.10.2"
lightning = "==2.2.4"
matplotlib = "==3.7.5"
networkx = "==3.1"
omegaconf = "==2.3.0"
onnx = "==1.16.0"
onnxruntime = "==1.18.0"
openai-whisper = "==20231117"
protobuf = "==4.25"
pyarrow = "==18.1.0"
pyworld = "==0.3.4"
rich = "==13.7.1"
transformers = "==4.51.3"
wetext = "==0.0.4"
wget = "==3.2"
x-transformers = ">=2.11,<3"

[target.win-64.pypi-dependencies]
torch = { url = "https://mirrors.aliyun.com/pytorch-wheels/cu128/torch-2.7.0%2Bcu128-cp312-cp312-win_amd64.whl" }
torchaudio = { url = "https://mirrors.aliyun.com/pytorch-wheels/cu128/torchaudio-2.7.0%2Bcu128-cp312-cp312-win_amd64.whl" }
torchvision = { url = "https://mirrors.aliyun.com/pytorch-wheels/cu128/torchvision-0.22.0%2Bcu128-cp312-cp312-win_amd64.whl" }
